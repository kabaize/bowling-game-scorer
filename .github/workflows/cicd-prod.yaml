name: Bowling Game Scorer CI/CD

# Stretch goals: Weekly security scans, automated unit tests, automated code quality (ie SonarQube) scans, secrets management capabilities, trigger workflow on updates to release branch or individual user feature branches.

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: "ghcr.io"
  API_IMAGE: "ghcr.io/kabaize/bowling-game-scorer-api"
  UI_IMAGE: "ghcr.io/kabaize/bowling-game-scorer-ui"

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bowling_ui/package-lock.json

      - name: Install dependencies
        working-directory: bowling_ui
        run: npm ci

      - name: Build
        working-directory: bowling_ui
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bowling_api
    env:
      RAILS_ENV: test

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v6

      - name: Set up Ruby on Rails
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          working-directory: bowling_api

      - name: Install backend dependencies
        run: bundle install

      - name: Prepare test database
        run: bundle exec rails db:prepare

      - name: Run backend specs
        run: bundle exec rspec

  build-docker:
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - build-backend

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./bowling_api/Dockerfile
          push: false
          tags: ${{ env.API_IMAGE }}:ci
          load: true

      - name: Build UI Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./bowling_ui
          file: ./bowling_ui/Dockerfile
          push: false
          tags: ${{ env.UI_IMAGE }}:ci
          load: true

