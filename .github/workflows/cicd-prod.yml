name: Bowling Game Scorer CI/CD

# Stretch goals: Recurring (weekly?) security scans, automated code quality (ie SonarQube) scans, secrets management capabilities, trigger workflow on updates to release branch or individual user feature branches.

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: "ghcr.io"
  API_IMAGE: "ghcr.io/kabaize/bowling-game-scorer-api"
  UI_IMAGE: "ghcr.io/kabaize/bowling-game-scorer-ui"
  API_IMAGE_TAR: "api-image.tar"
  UI_IMAGE_TAR: "ui-image.tar"

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bowling_ui/package-lock.json

      - name: Install dependencies
        working-directory: bowling_ui
        run: npm ci

      - name: Build
        working-directory: bowling_ui
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bowling_api
    env:
      RAILS_ENV: test

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v6

      - name: Set up Ruby on Rails
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          working-directory: bowling_api

      - name: Install backend dependencies
        run: bundle install

      - name: Prepare test database
        run: bundle exec rails db:prepare

      - name: Run backend specs
        run: bundle exec rspec

  build-docker:
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - build-backend

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./bowling_api/Dockerfile
          push: false
          tags: ${{ env.API_IMAGE }}:ci
          load: true

      - name: Build UI Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./bowling_ui
          file: ./bowling_ui/Dockerfile
          push: false
          tags: ${{ env.UI_IMAGE }}:ci
          load: true

      - name: Save Docker images
        run: |
          docker save ${{ env.API_IMAGE }}:ci -o ${{ env.API_IMAGE_TAR }}
          docker save ${{ env.UI_IMAGE }}:ci -o ${{ env.UI_IMAGE_TAR }}

      - name: Upload API image artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-image
          path: ${{ env.API_IMAGE_TAR }}
          retention-days: 1

      - name: Upload UI image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-image
          path: ${{ env.UI_IMAGE_TAR }}
          retention-days: 1

  security-scan:
    runs-on: ubuntu-latest
    needs: build-docker
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download API image artifact
        uses: actions/download-artifact@v8
        with:
          name: api-image

      - name: Download UI image artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-image

      - name: Confirm downloaded image artifacts
        run: |
          ls -lh
          test -f ${{ env.API_IMAGE_TAR }}
          test -f ${{ env.UI_IMAGE_TAR }}

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: ${{ env.API_IMAGE_TAR }}
          scanners: "vuln"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-api-results.sarif"
          exit-code: "0" # Temporarily set to 0 so that vulnerability scan doesn't block the remainder of the CI/CD process.
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload API Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-api-results.sarif"
          category: "trivy-api-image"

      - name: Scan UI image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: ${{ env.UI_IMAGE_TAR }}
          scanners: "vuln"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-ui-results.sarif"
          exit-code: "0" # Temporarily set to 0 so that vulnerability scan doesn't block the remainder of the CI/CD process.
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload UI Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-ui-results.sarif"
          category: "trivy-ui-image"

  publish:
    runs-on: ubuntu-latest
    needs: security-scan
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download API image artifact
        uses: actions/download-artifact@v8
        with:
          name: api-image

      - name: Download UI image artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-image

      - name: Confirm downloaded image artifacts
        run: |
          ls -lh
          test -f ${{ env.API_IMAGE_TAR }}
          test -f ${{ env.UI_IMAGE_TAR }}

      - name: Load Docker images
        run: |
          docker load -i ${{ env.API_IMAGE_TAR }}
          docker load -i ${{ env.UI_IMAGE_TAR }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Docker images for GitHub Container Registry
        run: |
          docker tag ${{ env.API_IMAGE }}:ci ${{ env.API_IMAGE }}:latest
          docker tag ${{ env.API_IMAGE }}:ci ${{ env.API_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.UI_IMAGE }}:ci ${{ env.UI_IMAGE }}:latest
          docker tag ${{ env.UI_IMAGE }}:ci ${{ env.UI_IMAGE }}:${{ github.sha }}

      - name: Push Docker images to GitHub Container Registry
        run: |
          docker push ${{ env.API_IMAGE }}:latest
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.UI_IMAGE }}:latest
          docker push ${{ env.UI_IMAGE }}:${{ github.sha }}
